Aries:
  traits:
    - імпульсивний
    - сміливий
    - змагальний
  specificity: "Імпульсивний вогняний знак; живиться рухом і динамікою."
  stereotype: "перший у спортзалі 2 січня, останній хто визнає, що втомився"
  love_style: "закохується за три дні, потім дивується, куди поділись метелики"
  money_style: "купує абонемент, велосипед і курс одразу, бо ж надихнувся"
Taurus:
  traits:
    - обережний
    - стабільний
    - практичний
  specificity: "Заземлений земний знак; цінує стабільність і терпіння."
  stereotype: "має улюблену чашку, улюблене місце на дивані й улюблену образу з 2019"
  love_style: "повільно впускає, але якщо впустив — це надовго і з пледом"
  money_style: "відкладає на чорний день, а витрачає на гарну вечерю і затишок"
Gemini:
  traits:
    - допитливий
    - адаптивний
    - балакучий
  specificity: "Повітряний знак ідей; гнучкий і швидко змінює курс."
  stereotype: "має 17 відкритих вкладок у голові й жодної закритої"
  love_style: "закохується в розмову; нудьга для нього страшніша за розставання"
  money_style: "три підписки, дві з яких забув, що оформив"
Cancer:
  traits:
    - захисний
    - чутливий
    - інтуїтивний
  specificity: "Водяний знак турботи; глибоко відчуває і оберігає дім."
  stereotype: "пам'ятає, хто що любить їсти, і ображається мовчки, по-домашньому"
  love_style: "любить турботою: нагодує, вкутає й хвилюватиметься замість тебе"
  money_style: "економить на собі, але на близьких витрачає не рахуючи"
Leo:
  traits:
    - упевнений
    - виразний
    - відданий
  specificity: "Вогняний знак лідерства; сяє, коли його бачать."
  stereotype: "переробить сторіз тричі, бо світло має падати правильно"
  love_style: "любить щедро й голосно; найбільше боїться, що його перестануть помічати"
  money_style: "якісно або ніяк; знижка — це особиста образа смаку"
Virgo:
  traits:
    - аналітичний
    - прискіпливий
    - корисний
  specificity: "Земний знак деталей; надає перевагу планам і точності."
  stereotype: "має таблицю на все, включно з тим, коли дозволити собі хаос"
  love_style: "любить через дрібниці: ліки, парасолька, нагадування поїсти"
  money_style: "знає курс гривні, відсоток кешбеку й де було на десять гривень дешевше"
Libra:
  traits:
    - дипломатичний
    - врівноважений
    - соціальний
  specificity: "Повітряний знак гармонії; шукає справедливість і партнерство."
  stereotype: "обирає між двома кафе так, ніби вирішує долю людства"
  love_style: "розквітає в парі; найважче для нього — сказати, чого хоче саме він"
  money_style: "купить гарне, навіть якщо непрактичне, бо естетика теж потреба"
Scorpio:
  traits:
    - інтенсивний
    - стратегічний
    - потайний
  specificity: "Водяний знак глибини; довіряє повільно, але віддається повністю."
  stereotype: "запам'ятає інтонацію, з якою ти збрехав, краще за саму брехню"
  love_style: "або все, або нічого; напівтонів у його коханні не передбачено"
  money_style: "тримає фінансову подушку й нікому не каже її розмір"
Sagittarius:
  traits:
    - оптимістичний
    - авантюрний
    - прямолінійний
  specificity: "Вогняний знак свободи; вчиться через дослідження."
  stereotype: "має список країн і жодного списку справ на завтра"
  love_style: "закохується в пригоду разом; клітку відчуває раніше, ніж її поставили"
  money_style: "відкладе на квиток швидше, ніж на холодильник"
Capricorn:
  traits:
    - дисциплінований
    - амбітний
    - реалістичний
  specificity: "Земний знак витривалості; будує довгострокові перемоги."
  stereotype: "відпочиває за розкладом і трохи винний, що відпочиває"
  love_style: "не говорить про почуття — будує надійність, і це його мова кохання"
  money_style: "інвестує, планує пенсію в 28 і знає, що таке складний відсоток"
Aquarius:
  traits:
    - незалежний
    - винахідливий
    - нестандартний
  specificity: "Повітряний знак інновацій; прихильний до сміливих нових кутів."
  stereotype: "робить навпаки з принципу, а потім доводить, що так і було правильно"
  love_style: "потребує простору й дружби всередині кохання; ревнощів не розуміє"
  money_style: "вкладеться в дивну ідею раніше, ніж купить нормальні штани"
Pisces:
  traits:
    - емпатичний
    - уявний
    - інтуїтивний
  specificity: "Водяний знак чуттів; творчий і духовно налаштований."
  stereotype: "плаче з реклами й рятує всіх, окрім себе"
  love_style: "розчиняється в людині; межі — це його довічний домашній проєкт"
  money_style: "гроші течуть крізь пальці красиво й трохи незрозуміло куди"
